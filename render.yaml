services:
  # ─── SINGLE SERVICE: API backend + Next.js web panel ──────────────────
  # Express (server.js) serves all /api/* endpoints at root.
  # Next.js is pre-built to client-web/out/ and served as static files by Express.
  # Everything lives at ONE URL — no split services.
  - type: web
    name: wpapp
    runtime: node
    plan: free
    # rootDir omitted — server.js is at repo root
    buildCommand: npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: MOBILE_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      # ⚠️ Set these secrets in Render Dashboard:
      #   MOBILE_API_KEY, WHATSAPP_TOKEN, PHONE_NUMBER_ID, VERIFY_TOKEN, ADMIN_KEY, GEMINI_API_KEY
      #   MONGODB_URI, ALLOWED_ORIGIN, PUBLIC_BASE_URL, WHATSAPP_APP_SECRET
